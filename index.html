<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Silent Screen — Stay</title>
    <style>
        /* RESET & RADICAL BLANK CANVAS
           Everything is pure black, no margins, no visual clutter.
           Only the essential text appears in baby pink, centered. */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* keeps text from being accidentally highlighted, but remains readable */
        }

        /* HTML + Body: completely empty black background, no distractions */
        html, body {
            width: 100%;
            height: 100%;
            background-color: #000000;   /* deep void black — blank screen */
            margin: 0;
            padding: 0;
            overflow: hidden;            /* ensures no scrollbars, pure “blank” field */
        }

        body {
            /* flex centers the text both horizontally & vertically — like a calm statement */
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Inter', system-ui, -apple-system, sans-serif;
            /* optional: subtle smoothing for modern PC displays */
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* main text element: baby pink (#FFB6C1) on absolute black.
           no background, no borders, no shadows. soft & minimal. */
        .stay-text {
            color: #FFB6C1;               /* baby pink text — soft, calm, elegant */
            text-align: center;
            font-weight: 650;             /* semi-bold but elegant — not too heavy, yet confident */
            font-size: clamp(2.2rem, 8vw, 5rem);
            /* responsive: on PC large monitors it scales nicely, not oversized,
               but still readable from a distance. Keep minimal elegance */
            letter-spacing: 0.02em;
            line-height: 1.3;
            max-width: 90vw;
            width: auto;
            background: none;
            border: none;
            outline: none;
            text-rendering: geometricPrecision;
            /* no shadow, no fancy effects — strictly words on a blank screen */
            transition: none;
            word-break: keep-all;          /* prevents awkward line breaks inside phrase */
            white-space: normal;           /* allows natural wrap if needed, but for PC view phrase fits nicely */
        }

        /* For accessible focus (keyboard navigation) we add a faint transparent outline
           only when focused — but doesn't disturb the "blank screen" minimalism */
        .stay-text:focus-visible {
            outline: 1px dotted rgba(255, 182, 193, 0.4);  /* subtle baby pink outline to match text */
            border-radius: 2px;
        }

        /* ensure no pseudo-elements add anything visual */
        .stay-text::before,
        .stay-text::after,
        body::before,
        body::after {
            content: none;
            display: none;
        }

        /* For absolute completeness, also remove potential background from root elements */
        :root {
            background-color: #000000;
        }

        /* Optional fallback: force any other container elements to be invisible 
           – but there is only one text node and no other elements */
    </style>
</head>
<body>
    <!-- 
        BLANK SCREEN + BABY PINK TEXT MESSAGE:
        "wishing you the best, it's all love on my side so take care."
        Perfectly centered across all PC monitors (desktop, laptop, wide).
        No icons, no decorations. Only essential words. 
        The design respects the "blank screen" command – background pitch black.
        Text appears in soft baby pink (#FFB6C1), minimal and gentle.
    -->
    <div class="stay-text" aria-label="Now we know your character lmao. You played so stay on that side bih. — gentle words in baby pink">
        take care.
    </div>
</body>
</html>
